name: invest_system
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.15.0
  firebase_database: ^11.1.3
  firebase_auth: ^5.6.0
  sqflite: ^2.3.3+1
  path: ^1.9.1
  path_provider: ^2.1.4
  connectivity_plus: ^6.0.5
  internet_connection_checker: ^1.0.0+1
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  flutter_riverpod: ^2.5.1
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^7.2.2
  permission_handler: ^11.3.1
  excel: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

# Configuration for Launcher Icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo/logo.png

# FIXED: Added missing Splash Screen configuration
flutter_native_splash:
  color: "#ffffff"
  image: assets/logo/logo.png
  # Note: Dimensions 360x330 depend on your actual 'logo.png' file size

  android_gravity: center
  android_12:
    image: assets/logo/logo.png
    icon_background_color: "#ffffff"

dependency_overrides:
  archive: ^3.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/provinces-and-districts.json
